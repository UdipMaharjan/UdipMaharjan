name: Update profile art

# Re-scrapes real contribution data from GitHub's public (unauthenticated)
# contributions endpoint and re-renders contrib-heatmap.svg, then commits the
# result if anything changed. No PAT, no secrets -- the default GITHUB_TOKEN
# (with "contents: write" below) is enough to push back to this repo.

on:
  schedule:
    - cron: "17 3 * * *"   # once a day
  workflow_dispatch: {}     # allow manual "Run workflow" trigger

permissions:
  contents: write

concurrency:
  group: update-profile-art
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: UdipMaharjan
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh contribution graph"
            git push
          fi
